name: Build SteamBox Ultimate (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests flet pyinstaller pillow
        
    - name: Build SteamBox Ultimate
      run: |
        # Usamos o steambox_ultra.py que já foi gerado e enviado
        python -m PyInstaller --noconfirm --onefile --windowed --name "SteamBox_Ultimate" --icon "logo.ico" "steambox_ultra.py"
        
    - name: Build Corrigir Steam (Opceional)
      run: |
        # Só compila se o arquivo existir no repositório (e couber no limite do GitHub)
        if (Test-Path "correcao_ultra.py") {
             python -m PyInstaller --noconfirm --onefile --console --name "Corrigir_Steam" --icon "logo.ico" "correcao_ultra.py"
        }
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SteamBox-Windows-Build
        path: |
          dist/*.exe
